name: Update Active Jobs

on:
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual triggering
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'data/raw/**'
      - 'docs/**'
      - '.github/workflows/**'
      - '**/*.md'

concurrency:
  group: data-updates
  cancel-in-progress: false

jobs:
  update-active-jobs:
    runs-on: ubuntu-latest
    environment: 'prod'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: true

      - name: Install uv
        uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
        with:
          enable-cache: true

      - name: Update active jobs for 2210 job code
        env:
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
        run: |
          uv run python -m fedjobs.main export-csv --job-code 2210 --limit 250 --output data/raw/active_2210_jobs.csv
        continue-on-error: true

      - name: Update active jobs for 1550 job code
        env:
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
        run: |
          uv run python -m fedjobs.main export-csv --job-code 1550 --limit 250 --output data/raw/active_1550_jobs.csv
        continue-on-error: true

      - name: Update active jobs for 1560 job code
        env:
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
        run: |
          uv run python -m fedjobs.main export-csv --job-code 1560 --limit 250 --output data/raw/active_1560_jobs.csv
        continue-on-error: true

      - name: Update active jobs for 0854 job code
        env:
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
        run: |
          uv run python -m fedjobs.main export-csv --job-code 0854 --limit 250 --output data/raw/active_0854_jobs.csv
        continue-on-error: true

      - name: Update active jobs for CDC agency
        env:
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
        run: |
          uv run python -m fedjobs.main export-csv --agency CDC --limit 250 --output data/raw/active_CDC_jobs.csv
        continue-on-error: true

      - name: Update active jobs for HHS agency
        env:
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
        run: |
          uv run python -m fedjobs.main export-csv --agency HHS --limit 250 --output data/raw/active_HHS_jobs.csv
        continue-on-error: true

      - name: Update active jobs for IRS agency
        env:
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
        run: |
          uv run python -m fedjobs.main export-csv --agency TR93 --limit 250 --output data/raw/active_IRS_jobs.csv
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/raw/*.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update active jobs for various jobs from USAJOBS API"
            git push
          fi
