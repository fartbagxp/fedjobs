name: Update Agency Codes

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual triggering
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'data/raw/**'
      - 'docs/**'
      - '.github/workflows/**'
      - '**/*.md'

concurrency:
  group: data-updates
  cancel-in-progress: false

jobs:
  update-agencies:
    runs-on: ubuntu-latest
    environment: 'prod'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Update agency codes
        env:
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
        run: uv run python -m fedjobs.main update-agencies

      - name: Commit and push changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/raw/agency_codes.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update agency codes from USAJOBS API"
            git push
          fi
