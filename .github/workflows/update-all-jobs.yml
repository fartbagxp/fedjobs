name: Update All Jobs

on:
  schedule:
    # Run daily at 4 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch: # Allow manual triggering
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'data/raw/**'
      - 'docs/**'
      - '.github/workflows/**'
      - '**/*.md'

concurrency:
  group: data-updates
  cancel-in-progress: false

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    environment: 'prod'
    continue-on-error: true
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - type: job-code
            value: "2210"
            label: "2210"
          - type: job-code
            value: "1550"
            label: "1550"
          - type: job-code
            value: "1560"
            label: "1560"
          - type: job-code
            value: "0854"
            label: "0854"
          - type: agency
            value: "CDC"
            label: "CDC"
          - type: agency
            value: "HHS"
            label: "HHS"
          - type: agency
            value: "TR93"
            label: "IRS"
          - type: agency
            value: "EOP"
            label: "EOP"
          - type: agency
            value: "VA"
            label: "VA"
          - type: agency
            value: "TR"
            label: "TREASURY"
          - type: agency
            value: "TD"
            label: "DoT"
          - type: agency
            value: "ST"
            label: "STATE"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          enable-cache: true

      - name: Fetch all jobs for ${{ matrix.label }}
        env:
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
        run: |
          uv run python -m fedjobs.main export-csv --${{ matrix.type }} ${{ matrix.value }} \
            --limit 250 --output data/raw/all_${{ matrix.label }}_jobs.csv --append

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: all_${{ matrix.label }}_jobs
          path: data/raw/all_${{ matrix.label }}_jobs.csv
          retention-days: 1

  commit-changes:
    needs: fetch-jobs
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Download artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: data/raw/
          merge-multiple: true

      - name: Commit and push changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/raw/*.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update all jobs for various jobs from USAJOBS API"
            git push
          fi
