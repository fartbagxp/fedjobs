name: Update All Jobs

on:
  schedule:
    # Run daily at 4 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch: # Allow manual triggering
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'data/raw/**'
      - 'docs/**'
      - '.github/workflows/**'
      - '**/*.md'

concurrency:
  group: data-updates
  cancel-in-progress: false

jobs:
  update-all-jobs:
    runs-on: ubuntu-latest
    environment: 'prod'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          enable-cache: true

      - name: Update all jobs for 2210 job code
        env:
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
        run: |
          uv run python -m fedjobs.main export-csv --job-code 2210 --limit 250 --output data/raw/all_2210_jobs.csv --append
        continue-on-error: true

      - name: Update all jobs for 1550 job code
        env:
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
        run: |
          uv run python -m fedjobs.main export-csv --job-code 1550 --limit 250 --output data/raw/all_1550_jobs.csv --append
        continue-on-error: true

      - name: Update all jobs for 1560 job code
        env:
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
        run: |
          uv run python -m fedjobs.main export-csv --job-code 1560 --limit 250 --output data/raw/all_1560_jobs.csv --append
        continue-on-error: true

      - name: Update all jobs for 0854 job code
        env:
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
        run: |
          uv run python -m fedjobs.main export-csv --job-code 0854 --limit 250 --output data/raw/all_0854_jobs.csv --append
        continue-on-error: true

      - name: Update all jobs for CDC agency
        env:
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
        run: |
          uv run python -m fedjobs.main export-csv --agency CDC --limit 250 --output data/raw/all_CDC_jobs.csv --append
        continue-on-error: true

      - name: Update all jobs for HHS agency
        env:
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
        run: |
          uv run python -m fedjobs.main export-csv --agency HHS --limit 250 --output data/raw/all_HHS_jobs.csv --append
        continue-on-error: true

      - name: Update all jobs for IRS agency
        env:
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
        run: |
          uv run python -m fedjobs.main export-csv --agency TR93 --limit 250 --output data/raw/all_IRS_jobs.csv --append
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/raw/*.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update all jobs for various jobs from USAJOBS API"
            git push
          fi
